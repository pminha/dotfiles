interface:
  display_name: "Single Paper Review (English)"
  short_description: "Summarize one paper as an English reusable note with a figure atlas"
  default_prompt: "Use $single-paper-review-en to summarize this paper into an English Obsidian note with metric definitions, main-paper figure captures saved under Attachments/, and one section that embeds every body figure in order."

policy:
  allow_implicit_invocation: true
